version: 0.2

phases:
  install:
    commands:
      - echo "Installing dependencies"
      - yum install -y openssh-clients

  pre_build:
    commands:
      - echo "Fetching SSH key"
      - aws ssm get-parameter --name "/deploy/key" --with-decryption --query Parameter.Value --output text > key.pem
      - chmod 400 key.pem

  build:
    commands:
      - echo "Deploying to EC2"
      - |
        ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@<EC2-PUBLIC-IP> << 'EOF'
        cd ~/app || mkdir ~/app && cd ~/app
        rm -rf *
        exit
        EOF

      - scp -o StrictHostKeyChecking=no -i key.pem -r * ec2-user@<EC2-PUBLIC-IP>:~/app/

      - |
        ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@<EC2-PUBLIC-IP> << 'EOF'
        cd ~/app
        npm install
        nohup node app.js > output.log 2>&1 &
        exit
        EOF

artifacts:
  files:
    - '**/*'
