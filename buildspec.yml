version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install

  post_build:
    commands:
      - echo "Deploying..."

      # Get key
      - aws ssm get-parameter --name "/deploy/key" --with-decryption --query Parameter.Value --output text > key.pem
      - chmod 400 key.pem

      # Create folder
      - ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@3.6.36.97 "mkdir -p ~/app"

      # Copy files
      - scp -o StrictHostKeyChecking=no -i key.pem app.js package.json ec2-user@3.6.36.97:~/app/

      # Run app (single line command)
      - ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@3.6.36.97 "cd ~/app && npm install && pkill node || true && nohup node app.js > output.log 2>&1 &"